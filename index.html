<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Loan Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <div class="card">
                <div class="card-header">
                    <h1 class="text-center mb-0">EMI Loan Calculator</h1>
                </div>
                <div class="card-body">
                    <form id="emiForm">
                        <div class="mb-4">
                            <label for="loanAmount" class="form-label">Loan Amount (Rs.)</label>
                            <input type="number" class="form-control" id="loanAmount" placeholder="Enter loan amount" min="1" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="interestRate" class="form-label">Interest Rate (% per annum)</label>
                            <input type="number" class="form-control" id="interestRate" placeholder="Enter interest rate" min="0.1" step="0.1" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="loanTenure" class="form-label">Loan Duration (Years)</label>
                            <input type="number" class="form-control" id="loanTenure" placeholder="Enter loan duration" min="1" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Calculate EMI</button>
                            <button type="button" class="btn btn-secondary btn-lg" id="resetBtn">Reset</button>
                        </div>
                    </form>
                    
                    <div id="resultSection" class="result-section mt-4">
                        <h3 class="text-center mb-4">Loan Summary</h3>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <div class="result-box">
                                    <p class="result-label">Monthly EMI</p>
                                    <p class="result-value" id="monthlyEMI">Rs.0</p>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="result-box">
                                    <p class="result-label">Total Payment</p>
                                    <p class="result-value" id="totalPayment">Rs.0</p>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="result-box">
                                    <p class="result-label">Total Interest</p>
                                    <p class="result-value" id="totalInterest">Rs.0</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
